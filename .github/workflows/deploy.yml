name: UBYS Deploy to Plesk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4

    - name: .NET 8 Kur
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Projeyi Derle
      run: dotnet publish StudentManagement.Web/StudentManagement.Web.csproj -c Release -o ./publish_output

    - name: 1. KİLİDİ AÇ (Sunucuyu Uyut)
      run: |
        echo "Sistem Guncelleniyor..." > app_offline.htm
        curl -u '${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}' -T app_offline.htm 'ftp://${{ secrets.FTP_SERVER }}/httpdocs/app_offline.htm'

    - name: 2. GÜNCEL KODLARI YÜKLE
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish_output/
        server-dir: /httpdocs/

    - name: 3. SİTEYİ UYANDIR (Kilidi Kaldır)
      if: always()
      run: |
        curl -u '${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}' -Q 'DELE /httpdocs/app_offline.htm' 'ftp://${{ secrets.FTP_SERVER }}/'