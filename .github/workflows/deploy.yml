name: UBYS Deploy to Plesk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4

    - name: .NET 8 Kur
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Projeyi Derle
      run: dotnet publish StudentManagement.Web/StudentManagement.Web.csproj -c Release -o ./publish_output

    - name: lftp Kur
      run: sudo apt-get install -y lftp

    - name: 1. KİLİDİ AÇ (Sunucuyu Uyut)
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        echo "Sistem Guncelleniyor, lutfen bekleyin..." > app_offline.htm
        lftp -c "
          set ftp:ssl-allow yes;
          set ssl:verify-certificate no;
          set net:timeout 30;
          set net:max-retries 3;
          open -u \"$FTP_USER\",\"$FTP_PASSWORD\" ftp://\"$FTP_SERVER\";
          put -O /httpdocs app_offline.htm;
          bye
        "

    - name: IIS'in Kapanmasını Bekle
      run: sleep 5

    - name: 2. GÜNCEL KODLARI YÜKLE
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish_output/
        server-dir: /httpdocs/
        exclude: |
          **/app_offline.htm

    - name: 3. SİTEYİ UYANDIR (Kilidi Kaldır)
      if: always()
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        lftp -c "
          set ftp:ssl-allow yes;
          set ssl:verify-certificate no;
          set net:timeout 30;
          set net:max-retries 3;
          open -u \"$FTP_USER\",\"$FTP_PASSWORD\" ftp://\"$FTP_SERVER\";
          rm -f /httpdocs/app_offline.htm;
          bye
        "