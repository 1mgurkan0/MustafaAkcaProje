name: UBYS Deploy to Plesk

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4

    - name: .NET 8 Kur
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Projeyi Derle ve Yayınla
      run: |
        dotnet publish StudentManagement.Web/StudentManagement.Web.csproj \
          -c Release \
          -o ./publish_output \
          /p:TreatWarningsAsErrors=false \
          /p:Nullable=disable

    - name: 1. KİLİDİ AÇ (Sunucuyu Uyut)
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        echo "Sistem Guncelleniyor..." > app_offline.htm
        python -c "
        import os, ftplib
        server = os.environ['FTP_SERVER'].replace('ftp://', '').replace('ftps://', '').strip()
        user = os.environ['FTP_USER'].strip()
        pwd = os.environ['FTP_PASSWORD']
        try:
            ftp = ftplib.FTP(server)
            ftp.login(user, pwd)
            with open('app_offline.htm', 'rb') as f:
                ftp.storbinary('STOR httpdocs/app_offline.htm', f)
            ftp.quit()
        except Exception as e:
            print('FTP Hatasi:', e)
            exit(1)
        "

    - name: IIS'in Kapanmasını Bekle
      run: sleep 8

    - name: 2. GÜNCEL KODLARI YÜKLE
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./publish_output/
        server-dir: /httpdocs/
        exclude: |
          **/app_offline.htm

    - name: 3. SİTEYİ UYANDIR (Kilidi Kaldır)
      if: always()
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USER: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        python -c "
        import os, ftplib
        server = os.environ['FTP_SERVER'].replace('ftp://', '').replace('ftps://', '').strip()
        user = os.environ['FTP_USER'].strip()
        pwd = os.environ['FTP_PASSWORD']
        try:
            ftp = ftplib.FTP(server)
            ftp.login(user, pwd)
            ftp.delete('httpdocs/app_offline.htm')
            ftp.quit()
        except Exception as e:
            print('Uyandirma sirasinda hata (veya dosya zaten silinmis):', e)
        "